services:
  corolive-backend:
    build: .
    container_name: corolive-backend
    restart: unless-stopped
    environment:
      TZ: Pacific/Auckland          # capture times use this timezone
      COROLIVE_ANIMATE_AT: "22:10"  # encode all timelapses at this local time
    volumes:
      - ./data:/data                # all captured data lives here
      - ./config:/config:ro         # cameras.yaml (read-only)

  corolive-web:
    image: nginxinc/nginx-unprivileged:alpine   # runs as non-root (uid 101)
    container_name: corolive-web
    restart: unless-stopped
    ports:
      - "8080:8080"                 # browse/serve the data tree here
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true                 # container filesystem is immutable
    tmpfs:                          # ...except the few dirs nginx must write
      - /tmp
      - /var/cache/nginx
      - /var/run
    cap_drop:
      - ALL                         # static serving needs no capabilities
    security_opt:
      - no-new-privileges:true      # block privilege escalation
    mem_limit: 64m
    pids_limit: 100
