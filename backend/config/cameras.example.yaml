# Copy to cameras.yaml (gitignored) and fill in real URLs + credentials.
#
# All cameras' timelapses are encoded once a day at ANIMATE_AT (default 22:10),
# one after another. Set the time with the COROLIVE_ANIMATE_AT env var (HH:MM).
# Per-camera animation_at is no longer used.

cameras:
  - name: whitianga
    url: "http://username:password@127.0.0.1/GetSnapshot"

  - name: whangamata
    url: "http://username:password@127.0.0.1/GetSnapshot"

  - name: thames
    url: "http://username:password@127.0.0.1/GetSnapshot"
