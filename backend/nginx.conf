server {
    listen 8080 default_server;
    root /usr/share/nginx/html;

    # --- Information disclosure -------------------------------------------
    server_tokens off;                 # no nginx version in headers/errors

    # --- Directory browsing ----------------------------------------------
    autoindex on;
    autoindex_localtime on;            # listing timestamps in local (NZ) time

    # --- This is a read-only file server: no bodies, tiny headers ---------
    client_max_body_size      1k;
    client_body_buffer_size   1k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 4k;

    # --- Slowloris / idle-connection mitigation --------------------------
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          30s;
    keepalive_timeout     30s;

    location / {
        limit_except GET HEAD { deny all; }   # reject POST/PUT/DELETE/etc.
        add_header Cache-Control "public, max-age=60";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Proxy archived years (2019-2025) to unraid for all cameras.
    # Current year (2026+) is stored locally and served by the parent autoindex locations below.
    #
    # To move a year from local to unraid, extend the regex:
    #   Current:  20(?:1[9]|2[0-5])   matches 2019-2025
    #   Add 2026: 20(?:1[9]|2[0-6])   change 2[0-5] -> 2[0-6]
    #   Add 2027: 20(?:1[9]|2[0-7])   change 2[0-6] -> 2[0-7]
    #   Add 2030: 20(?:1[9]|2\d|30)   add a new alternation for 30
    #
    # NOTE: regex locations are evaluated top-to-bottom, so this must stay
    # above the generic `location ~ /archive/` block to take precedence.
    location ~ ^/(whitianga|whangamata|thames)/archive/(20(?:1[9]|2[0-5])) {
        proxy_pass http://10.137.2.11:8085;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Archived frames/timelapses never change — cache them hard.
    # Path is /<camera>/archive/YYYY/MM/DD/..., so match archive/ anywhere.
    location ~ /archive/ {
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
